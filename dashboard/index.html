<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Engineering Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-grid"></div>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">🛡️</span>
                <h1>NEXUS // <span>Threat Monitor</span></h1>
            </div>
            <div class="status-badge pulse">
                <span class="dot"></span> System Active
            </div>
        </header>

        <main>
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Total Alerts</h3>
                    <p id="total-alerts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Latest Threat IP</h3>
                    <p id="latest-ip">None</p>
                </div>
                <div class="stat-card">
                    <h3>System Status</h3>
                    <p class="status-ok">Secure</p>
                </div>
            </div>

            <div class="alerts-section">
                <h2>Real-Time Security Alerts</h2>
                <div class="alerts-feed" id="alerts-container">
                    <!-- Alerts will be injected here by JS -->
                    <div class="empty-state">No malicious activity detected.</div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
